[content_types.Pages]
method = "get_pages"
html_field = "body"
title_field = "title"
url_field = "url"
id_field = "page_id"
published_field = "published"
hidden_field = "hide_from_students"
keyword_params = { include = ["body"] } # TOML supports inline dictionaries!

[content_types.Files]
method = "get_files"
html_field = "N/A"
title_field = "display_name"
file_type_field = "content-type"
mime_type_field = "mime_class"
url_field = "url"
id_field = "id"
hidden_field = "hidden"
folder_field = "folder_id" # Could be used to connect to parent folder...
keyword_params = {}

[content_types.Assignments]
method = "get_assignments"
html_field = "description"
title_field = "name"
url_field = "html_url"
id_field = "id"
published_field = "published"
visbility_field = "assignment_visibility"
discussion_topic_field = "discussion_topic"
uses_rubric_field = "use_rubric_for_grading"
rubric_field = "rubric"
keyword_params = { include = ["assignment_visibility"]}

[content_types.Discussions]
method = "get_discussion_topics"
html_field = "message"
title_field = "title"
url_field = "html_url"
id_field = "id"
published_field = "published"
attachments_field = "attachments"
keyword_params = {}


